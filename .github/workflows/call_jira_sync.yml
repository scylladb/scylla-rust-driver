name: Sync Jira Based on PR Events

on:
  pull_request_target:
    types: [opened, edited, ready_for_review, review_requested, labeled, unlabeled, closed]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  jira-sync:
    uses: scylladb/github-automation/.github/workflows/main_pr_events_jira_sync.yml@2de33d1aa4599f1a5f95fa3f33d396097ce59191 # main
    with:
      caller_action: ${{ github.event.action }}
    secrets:
      caller_jira_auth: ${{ secrets.USER_AND_KEY_FOR_JIRA_AUTOMATION }}
