# This workflow builds the book with documentation and checks that
# book_tests.rs is up to date with the book chapters.
# Book code examples are now tested via `cargo test --doc` as part of
# the normal test suite (see the book_tests module in scylla crate).
name: Book

on:
  push:
    branches:
    - main
    - 'branch-*'
  pull_request:
    branches:
    - '**'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Setup rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0
    - name: Install mdbook
      uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1 # v2.75.2
      with:
        tool: mdbook
    - name: Build the book
      run: mdbook build docs
    - name: Check book_tests.rs is up to date
      run: make check-book-tests
