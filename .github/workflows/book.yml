# This workflow builds the book with documentation and checks that
# book_tests.rs is up to date with the book chapters.
# Book code examples are now tested via `cargo test --doc` as part of
# the normal test suite (see the book_tests module in scylla crate).
name: Book

on:
  push:
    branches:
    - main
    - 'branch-*'
  pull_request:
    branches:
    - '**'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v3
    - name: Setup rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
    - name: Install mdbook
      uses: taiki-e/install-action@v2
      with:
        tool: mdbook
    - name: Build the book
      run: mdbook build docs
    - name: Check book_tests.rs is up to date
      run: make check-book-tests
